# Deploy Hall Pass (Next.js) to Firebase Hosting from Linux — avoids Windows symlink (EPERM) when building the SSR/Functions bundle.
name: Deploy Hall Pass to Firebase

on:
  push:
    branches: ["main"]
    paths:
      - "hallpassapp/**"
      - ".github/workflows/firebase-hallpass.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hallpassapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hallpassapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.5.1

      - name: Enable web frameworks
        run: firebase experiments:enable webframeworks

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project hallpass-vspd --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
