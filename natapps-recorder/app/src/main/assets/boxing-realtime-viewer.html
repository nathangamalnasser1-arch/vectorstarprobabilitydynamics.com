<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Boxing Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000508;color:#00ffee;font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw}
#waveCanvas{position:fixed;top:0;left:0;width:100%;height:100%}
#graphCanvas{position:fixed;top:0;left:0;width:100%;height:100%;display:none}
#tabBar{position:fixed;top:0;left:0;right:0;z-index:20;height:36px;display:flex;background:rgba(0,5,10,0.92);border-bottom:1px solid rgba(0,255,238,0.08)}
.tab{padding:0 20px;display:flex;align-items:center;font-size:11px;letter-spacing:0.12em;cursor:pointer;opacity:0.45;border-bottom:2px solid transparent;user-select:none}
.tab.act{opacity:1;border-bottom-color:#00ffee}
#pill{position:fixed;top:44px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(0,5,10,0.88);border:1px solid rgba(0,255,238,0.3);border-radius:24px;padding:5px 24px;font-size:26px;letter-spacing:0.06em;white-space:nowrap;text-align:center;transition:color .3s,border-color .3s;pointer-events:none}
#pill.rest{color:#ff6600;border-color:rgba(255,102,0,0.45)}
#botBar{position:fixed;bottom:0;left:0;right:0;z-index:20;height:46px;display:flex;align-items:center;gap:16px;padding:0 16px;background:rgba(0,5,10,0.92);border-top:1px solid rgba(0,255,238,0.08)}
.pc{font-size:12px;letter-spacing:0.04em}
#thLbl{font-size:10px;opacity:0.45;white-space:nowrap}
#thSlider{width:88px;accent-color:#00ffee;cursor:pointer}
#liveSt{font-size:10px;opacity:0.45;margin-left:auto}
#overlay{position:fixed;inset:0;z-index:50;background:rgba(0,5,10,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#overlay.h{display:none}
#overlay h1{font-size:30px;letter-spacing:0.14em}
#overlay p{font-size:12px;opacity:0.45}
#ipIn{background:rgba(0,255,238,0.06);border:1px solid rgba(0,255,238,0.3);color:#00ffee;font-family:monospace;padding:10px 14px;font-size:15px;outline:none;width:240px}
#ipIn::placeholder{color:rgba(0,255,238,0.3)}
.gbtn{background:#00ffee;color:#000508;font-family:monospace;font-weight:bold;font-size:13px;letter-spacing:0.1em;border:none;padding:11px 22px;cursor:pointer}
#ovSt{font-size:11px;opacity:0.45;min-height:18px}
</style>
</head>
<body>

<div id="overlay">
  <h1>BOXING LIVE</h1>
  <p>Connect to the phone relay server</p>
  <div style="display:flex;gap:8px">
    <input id="ipIn" placeholder="192.168.x.x" />
    <button class="gbtn" onclick="doConnect()">CONNECT</button>
  </div>
  <div id="ovSt"></div>
</div>

<div id="tabBar">
  <div class="tab act" onclick="setTab('live')">LIVE</div>
  <div class="tab" onclick="setTab('graphs')">GRAPHS</div>
</div>

<div id="pill">ROUND 1  3:00</div>

<canvas id="waveCanvas"></canvas>
<canvas id="graphCanvas"></canvas>

<div id="botBar">
  <span class="pc" style="color:#00e5ff">L ✦ <span id="pL">0</span></span>
  <span class="pc" style="color:#ff6d00">R ✦ <span id="pR">0</span></span>
  <span id="thLbl">PUNCH &gt; <span id="thV">3.0</span>g</span>
  <input id="thSlider" type="range" min="1" max="8" step="0.5" value="3" oninput="setThresh(this.value)">
  <span id="liveSt">—</span>
</div>

<script>
const DPR=devicePixelRatio||1
const CYAN='#00e5ff',ORANGE='#ff6d00'
const WAVE_SECS=10,MAX_G=15,ROUND_MS=180000

let tab='live',punchThresh=3
let flashL=0,flashR=0,lastFrameT=0
let sessionStart=null
let roundNum=1,roundState='idle',roundStartWall=null
let connL=false,connR=false
let liveWs=null
let sampleCntL=0,sampleCntR=0

const waveL=[],waveR=[]      // [{t,g,rot}] — 10s ring buffer
const allL=[],allR=[]        // thinned (1 per 5 samples) full history
const punchL=[],punchR=[]    // [{t,g}]

const wc=document.getElementById('waveCanvas')
const wx=wc.getContext('2d')
const gc=document.getElementById('graphCanvas')
const gx=gc.getContext('2d')

// ── Resize ───────────────────────────────────────────────────

function resize(){
  wc.width=gc.width=innerWidth*DPR
  wc.height=gc.height=innerHeight*DPR
  wc.style.width=gc.style.width=innerWidth+'px'
  wc.style.height=gc.style.height=innerHeight+'px'
}
addEventListener('resize',resize);resize()

// ── Tab ──────────────────────────────────────────────────────

function setTab(t){
  tab=t
  document.querySelectorAll('.tab').forEach(el=>{
    el.classList.toggle('act',el.textContent.trim().toLowerCase()===t)
  })
  wc.style.display=t==='live'?'block':'none'
  gc.style.display=t==='graphs'?'block':'none'
}

// ── Auto-connect on ?live=1 ──────────────────────────────────

const params=new URLSearchParams(location.search)
if(params.has('live')){
  const host=params.get('host')||location.hostname||'localhost'
  connectTo(host)
}

function doConnect(){
  const ip=document.getElementById('ipIn').value.trim()||'localhost'
  connectTo(ip)
}

function connectTo(ip){
  if(liveWs){try{liveWs.close()}catch(_){}}
  setSt('Connecting…')
  document.getElementById('ovSt').textContent='Connecting…'
  const proto=location.protocol==='https:'?'wss:':'ws:'
  const isIp=/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)||ip==='localhost'
  liveWs=new WebSocket(isIp?proto+'//'+ip+':9001':proto+'//'+ip)
  liveWs.onopen=()=>{
    liveWs.send(JSON.stringify({type:'register',role:'viewer',mode:'boxing'}))
    setSt('Connected ●')
    document.getElementById('ovSt').textContent=''
    document.getElementById('overlay').classList.add('h')
  }
  liveWs.onmessage=e=>{try{handleMsg(JSON.parse(e.data))}catch(_){}}
  liveWs.onerror=()=>setSt('Cannot reach relay')
  liveWs.onclose=()=>{
    setSt('Disconnected')
    document.getElementById('overlay').classList.remove('h')
  }
}

function setSt(s){document.getElementById('liveSt').textContent=s}
function setThresh(v){punchThresh=parseFloat(v);document.getElementById('thV').textContent=(+v).toFixed(1)}

// ── Messages ─────────────────────────────────────────────────

function handleMsg(msg){
  const now=Date.now()
  if(!sessionStart)sessionStart=now

  if(msg.type==='sensor'){
    const isR=msg.device==='right'
    const g=isFinite(+msg.accel_mag)?(+msg.accel_mag)/9.81:1
    const rot=isFinite(+msg.gyro_mag)?(+msg.gyro_mag)*(180/Math.PI):0
    const entry={t:now,g,rot}
    if(isR){
      waveR.push(entry)
      sampleCntR++
      if(sampleCntR%5===0)allR.push(entry)
    }else{
      waveL.push(entry)
      sampleCntL++
      if(sampleCntL%5===0)allL.push(entry)
    }
    // Punch detection with 150ms debounce
    const pArr=isR?punchR:punchL
    if(g>punchThresh){
      const last=pArr.length>0?pArr[pArr.length-1]:null
      if(!last||now-last.t>150){
        pArr.push({t:now,g})
        document.getElementById(isR?'pR':'pL').textContent=pArr.length
        if(isR)flashR=1;else flashL=1
      }
    }
    if(isR)connR=true;else connL=true
  }else if(msg.type==='round_start'){
    roundNum=+msg.round||roundNum
    roundState='active'
    roundStartWall=Date.now()
    updatePill()
  }else if(msg.type==='round_end'){
    roundState='rest'
    updatePill()
  }else if(msg.type==='status'){
    if(msg.device==='left')connL=msg.connected===true
    else if(msg.device==='right')connR=msg.connected===true
  }
}

// ── Round pill ───────────────────────────────────────────────

function updatePill(){
  const el=document.getElementById('pill')
  if(roundState==='rest'){el.className='rest';el.textContent='REST  ●';return}
  const secsLeft=roundStartWall
    ?Math.max(0,Math.round((ROUND_MS-(Date.now()-roundStartWall))/1000))
    :180
  const m=Math.floor(secsLeft/60),s=secsLeft%60
  el.className=secsLeft<=30?'rest':''
  el.textContent=`ROUND ${roundNum}  ${m}:${s.toString().padStart(2,'0')}`
}

// ── Animation loop ────────────────────────────────────────────

function frame(ts){
  requestAnimationFrame(frame)
  const dt=Math.min(ts-lastFrameT,100)/1000;lastFrameT=ts
  flashL=Math.max(0,flashL-dt*6)
  flashR=Math.max(0,flashR-dt*6)
  const cutoff=Date.now()-WAVE_SECS*1000
  while(waveL.length>1&&waveL[0].t<cutoff)waveL.shift()
  while(waveR.length>1&&waveR[0].t<cutoff)waveR.shift()
  if(roundState==='active')updatePill()
  if(tab==='live')drawWave()
  else drawGraphs()
}
requestAnimationFrame(frame)

// ── Waveform ─────────────────────────────────────────────────

function drawWave(){
  const W=wc.width,H=wc.height
  const TAB=36*DPR,BOT=46*DPR
  const drawH=H-TAB-BOT
  const lH=drawH/2

  wx.fillStyle='#000508';wx.fillRect(0,0,W,H)

  const divY=TAB+lH
  wx.strokeStyle='rgba(255,255,255,0.1)';wx.lineWidth=DPR
  wx.beginPath();wx.moveTo(0,divY);wx.lineTo(W,divY);wx.stroke()

  drawLane(waveL,W,TAB,lH,CYAN,flashL,connL,'L')
  drawLane(waveR,W,TAB+lH,lH,ORANGE,flashR,connR,'R')

  // Punch stamps on divider line
  const now=Date.now()
  ;[{arr:punchL,col:CYAN},{arr:punchR,col:ORANGE}].forEach(({arr,col})=>{
    arr.forEach(p=>{
      const age=(now-p.t)/1000;if(age>WAVE_SECS)return
      const x=W*(1-age/WAVE_SECS)
      wx.fillStyle=col;wx.globalAlpha=Math.max(0,0.9*(1-age/WAVE_SECS))
      wx.beginPath();wx.arc(x,divY,3.5*DPR,0,Math.PI*2);wx.fill()
      wx.globalAlpha=1
    })
  })
}

function drawLane(data,W,y0,lH,color,flash,conn,label){
  const now=Date.now()
  // Flash overlay on punch
  if(flash>0){wx.fillStyle=`rgba(255,255,255,${flash*0.11})`;wx.fillRect(0,y0,W,lH)}
  // Status label
  wx.font=`bold ${11*DPR}px Courier New`
  wx.fillStyle=conn?color:'rgba(120,120,120,0.4)'
  wx.fillText(label+(conn?' ●':' ○'),10*DPR,y0+18*DPR)
  // Threshold dashed line
  const tY=y0+lH-(punchThresh/MAX_G)*lH*0.88
  wx.strokeStyle='rgba(255,255,255,0.15)';wx.lineWidth=DPR*0.75
  wx.setLineDash([4*DPR,4*DPR])
  wx.beginPath();wx.moveTo(0,tY);wx.lineTo(W,tY);wx.stroke()
  wx.setLineDash([])
  if(data.length<2)return
  // Fill (newest→right, oldest→left; iterate newest-first for right-to-left path)
  wx.beginPath();wx.moveTo(W,y0+lH)
  for(let i=data.length-1;i>=0;i--){
    const x=W*(1-(now-data[i].t)/1000/WAVE_SECS)
    wx.lineTo(x,y0+lH-(Math.min(data[i].g,MAX_G)/MAX_G)*lH*0.88)
  }
  const oldX=W*(1-(now-data[0].t)/1000/WAVE_SECS)
  wx.lineTo(oldX,y0+lH);wx.closePath()
  wx.fillStyle=hexA(color,0.2);wx.fill()
  // Line
  wx.beginPath()
  for(let i=data.length-1;i>=0;i--){
    const x=W*(1-(now-data[i].t)/1000/WAVE_SECS)
    const y=y0+lH-(Math.min(data[i].g,MAX_G)/MAX_G)*lH*0.88
    i===data.length-1?wx.moveTo(x,y):wx.lineTo(x,y)
  }
  wx.strokeStyle=color;wx.lineWidth=1.8*DPR;wx.stroke()
}

// ── Graphs ───────────────────────────────────────────────────

function drawGraphs(){
  const W=gc.width,H=gc.height
  const TAB=36*DPR,rH=(H-TAB)/4
  gx.fillStyle='#000103';gx.fillRect(0,0,W,H)
  if(!sessionStart||(allL.length+allR.length===0)){
    gx.fillStyle='rgba(0,255,238,0.28)';gx.font=`${12*DPR}px Courier New`
    gx.textAlign='center';gx.fillText('No data yet',W/2,H/2);gx.textAlign='left';return
  }
  const latest=Math.max(
    allL.length?allL[allL.length-1].t:sessionStart,
    allR.length?allR[allR.length-1].t:sessionStart
  )
  const DUR=Math.max(1,latest-sessionStart)

  // Row 1: G-FORCE
  drawLineRow(0,rH,W,TAB,'G-FORCE',DUR,
    allL.map(d=>[(d.t-sessionStart)/DUR,d.g]),
    allR.map(d=>[(d.t-sessionStart)/DUR,d.g]),
    MAX_G)

  // Row 2: PUNCH COUNT (5s buckets)
  drawPunchRow(1,rH,W,TAB,DUR)

  // Row 3: ROTATION
  const maxRot=Math.max(1,...allL.map(d=>d.rot),...allR.map(d=>d.rot))
  drawLineRow(2,rH,W,TAB,'ROTATION (°/s)',DUR,
    allL.map(d=>[(d.t-sessionStart)/DUR,d.rot]),
    allR.map(d=>[(d.t-sessionStart)/DUR,d.rot]),
    maxRot)

  // Row 4: IMPACT RATE
  drawImpactRow(3,rH,W,TAB,DUR)

  // Round boundary lines across all rows
  if(roundStartWall&&roundState!=='idle'){
    const roundEndMs=roundStartWall-sessionStart+ROUND_MS
    const rx=Math.min(roundEndMs/DUR,1)*W
    gx.strokeStyle='rgba(255,102,0,0.3)';gx.lineWidth=DPR
    gx.setLineDash([3*DPR,3*DPR])
    gx.beginPath();gx.moveTo(rx,TAB);gx.lineTo(rx,H);gx.stroke()
    gx.setLineDash([])
  }
}

function rowHeader(rowIdx,rH,W,TAB,label){
  const y0=TAB+rowIdx*rH
  if(rowIdx>0){
    gx.strokeStyle='rgba(0,255,238,0.07)';gx.lineWidth=1
    gx.beginPath();gx.moveTo(0,y0);gx.lineTo(W,y0);gx.stroke()
  }
  gx.fillStyle='rgba(0,255,238,0.28)';gx.font=`bold ${7*DPR}px Courier New`
  gx.fillText(label,8*DPR,y0+13*DPR)
  return y0
}

function drawSeries(pts,col,W,DY,DH,maxV){
  if(pts.length<2)return
  // fill
  gx.beginPath();gx.moveTo(pts[0][0]*W,DY+DH)
  pts.forEach(([fx,v])=>gx.lineTo(fx*W,DY+DH-Math.min(v,maxV)/maxV*DH))
  gx.lineTo(pts[pts.length-1][0]*W,DY+DH);gx.closePath()
  gx.fillStyle=hexA(col,0.18);gx.fill()
  // line
  gx.beginPath()
  pts.forEach(([fx,v],i)=>{
    const x=fx*W,y=DY+DH-Math.min(v,maxV)/maxV*DH
    i===0?gx.moveTo(x,y):gx.lineTo(x,y)
  })
  gx.strokeStyle=col;gx.lineWidth=1.5*DPR;gx.stroke()
}

function drawLineRow(rowIdx,rH,W,TAB,label,DUR,ptL,ptR,maxV){
  const y0=rowHeader(rowIdx,rH,W,TAB,label)
  const DH=rH-22*DPR,DY=y0+20*DPR
  drawSeries(ptL,CYAN,W,DY,DH,maxV)
  drawSeries(ptR,ORANGE,W,DY,DH,maxV)
  // Legend
  gx.font=`${6.5*DPR}px Courier New`
  if(ptL.length){gx.fillStyle=CYAN; gx.fillText('L',W-20*DPR,y0+13*DPR)}
  if(ptR.length){gx.fillStyle=ORANGE;gx.fillText('R',W-12*DPR,y0+13*DPR)}
}

function drawPunchRow(rowIdx,rH,W,TAB,DUR){
  const y0=rowHeader(rowIdx,rH,W,TAB,'PUNCH COUNT  (5s buckets)')
  const DH=rH-22*DPR,DY=y0+20*DPR
  const BUCKET_MS=5000
  const nB=Math.max(1,Math.ceil(DUR/BUCKET_MS))
  const buckL=new Array(nB).fill(0),buckR=new Array(nB).fill(0)
  punchL.forEach(p=>{const bi=Math.min(nB-1,Math.floor((p.t-sessionStart)/BUCKET_MS));if(bi>=0)buckL[bi]++})
  punchR.forEach(p=>{const bi=Math.min(nB-1,Math.floor((p.t-sessionStart)/BUCKET_MS));if(bi>=0)buckR[bi]++})
  const maxP=Math.max(1,...buckL,...buckR)
  const bW=W/nB
  for(let i=0;i<nB;i++){
    const bx=i/nB*W,half=bW*0.44
    if(buckL[i]>0){const bh=buckL[i]/maxP*DH;gx.fillStyle=hexA(CYAN,0.75);gx.fillRect(bx,DY+DH-bh,half,bh)}
    if(buckR[i]>0){const bh=buckR[i]/maxP*DH;gx.fillStyle=hexA(ORANGE,0.75);gx.fillRect(bx+half,DY+DH-bh,half,bh)}
  }
}

function drawImpactRow(rowIdx,rH,W,TAB,DUR){
  const y0=rowHeader(rowIdx,rH,W,TAB,'IMPACT RATE  (punches/min, 30s window)')
  const DH=rH-22*DPR,DY=y0+20*DPR
  const WINDOW_MS=30000,STEP_MS=3000
  const all=[...punchL,...punchR].sort((a,b)=>a.t-b.t)
  if(all.length<1)return
  const pts=[]
  for(let t=0;t<=DUR;t+=STEP_MS){
    const abs=sessionStart+t
    let cnt=0;for(const p of all){if(p.t>abs)break;if(p.t>abs-WINDOW_MS)cnt++}
    pts.push({x:t/DUR*W,r:cnt*(60000/WINDOW_MS)})
  }
  const maxR=Math.max(1,...pts.map(p=>p.r))
  // fill
  gx.beginPath();gx.moveTo(pts[0].x,DY+DH)
  pts.forEach(p=>gx.lineTo(p.x,DY+DH-p.r/maxR*DH))
  gx.lineTo(pts[pts.length-1].x,DY+DH);gx.closePath()
  gx.fillStyle='rgba(0,255,238,0.1)';gx.fill()
  // line
  gx.beginPath()
  pts.forEach((p,i)=>i===0?gx.moveTo(p.x,DY+DH-p.r/maxR*DH):gx.lineTo(p.x,DY+DH-p.r/maxR*DH))
  gx.strokeStyle='rgba(0,255,238,0.75)';gx.lineWidth=1.5*DPR;gx.stroke()
}

// ── Helpers ──────────────────────────────────────────────────

function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16)
  const g=parseInt(hex.slice(3,5),16)
  const b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${a})`
}
</script>
</body>
</html>
