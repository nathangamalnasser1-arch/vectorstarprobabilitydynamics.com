<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#ccc;font-family:monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#hdr{background:#0c0c0c;border-bottom:1px solid #1a1a1a;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
#hdr h1{color:#00d4ff;font-size:16px;letter-spacing:.12em;font-family:sans-serif-condensed,sans-serif;white-space:nowrap}
.badge{background:#111;border:1px solid #222;padding:2px 9px;font-size:10px;border-radius:2px}
.bl{color:#00d4ff}.br{color:#ff6b35}.bw{color:#666}
#main{display:flex;flex:1;overflow:hidden;min-height:0}
#left-col{display:flex;flex-direction:column;flex:1;min-width:0}
#scene-wrap{position:relative;flex:1;min-height:300px;background:#050508}
#c3d{width:100%;height:100%}
#slabels{position:absolute;top:8px;left:0;width:100%;display:flex;justify-content:space-around;pointer-events:none}
.skl{font-size:10px;letter-spacing:.1em;padding:2px 9px;border-radius:2px;border:1px solid}
#infobar{background:#0a0a0a;border-top:1px solid #181818;border-bottom:1px solid #181818;padding:5px 12px;display:flex;gap:20px;font-size:11px;flex-shrink:0}
.ig{display:flex;gap:6px;align-items:center}.il{color:#333;font-size:9px}
#tl-wrap{position:relative;height:72px;flex-shrink:0;cursor:crosshair}
#tl-bg,#tl-cur{position:absolute;top:0;left:0;width:100%;height:100%}
#ctrl{background:#0a0a0a;border-top:1px solid #181818;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.btn{background:#141414;border:1px solid #242424;color:#999;padding:5px 12px;cursor:pointer;font-size:12px;font-family:monospace;border-radius:2px;transition:background .12s}
.btn:hover{background:#1e1e1e}.btn.active{background:#00d4ff18;border-color:#00d4ff55;color:#00d4ff}
#scrubber{flex:1;min-width:80px;accent-color:#00d4ff;cursor:pointer}
#tdisp{color:#00d4ff;font-size:12px;min-width:110px;text-align:right}
#spds{display:flex;gap:3px}.spd{padding:4px 7px;font-size:10px}
#status{position:absolute;bottom:6px;right:10px;font-size:10px;color:#2a2a2a}
/* ── route panel ── */
#route-col{width:220px;flex-shrink:0;background:#070710;border-left:1px solid #14141e;display:flex;flex-direction:column}
#route-hdr{padding:8px 10px;font-size:9px;letter-spacing:.15em;color:#333;border-bottom:1px solid #111;flex-shrink:0}
#route-wrap{flex:1;position:relative;overflow:hidden}
#route-canvas{position:absolute;top:0;left:0}
#route-cursor{position:absolute;top:0;left:0;pointer-events:none}
#evts{flex-shrink:0;max-height:160px;overflow-y:auto;border-top:1px solid #111}
.evt{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid #0e0e0e;cursor:pointer;font-size:10px;transition:background .1s}
.evt:hover{background:#111}.et{color:#444;min-width:48px}.esl{color:#00ff88;min-width:12px}.esr{color:#ff4444;min-width:12px}.ety{min-width:90px}.ev{color:#aaa}
#gps-map{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:1}
.leaflet-container{background:#070710}
#btn-load{color:#00d4ff88;border-color:#00d4ff22}
#btn-load:hover{color:#00d4ff;background:#00d4ff11}
#file-input{display:none}
</style>
</head>

/* ── Madgwick ─────────────────────────────────────────────────────────────── */
class Madgwick{
  constructor(b=0.04){this.b=b;this.q=[1,0,0,0];}
  update(gx,gy,gz,ax,ay,az,dt){
    let[q0,q1,q2,q3]=this.q;
    let n=Math.sqrt(ax*ax+ay*ay+az*az);if(!n)return;ax/=n;ay/=n;az/=n;
    const q0q0=q0*q0,q1q1=q1*q1,q2q2=q2*q2,q3q3=q3*q3;
    let s0=2*q0*q2q2+2*q2*ax+2*q0*q1q1-2*q1*ay;
    let s1=4*q1*q3q3-2*q3*ax+4*q0q0*q1-2*q0*ay-4*q1+8*q1*(q1q1+q2q2)+4*q1*az;
    let s2=4*q0q0*q2+2*q0*ax+4*q2*q3q3-2*q3*ay-4*q2+8*q2*(q1q1+q2q2)+4*q2*az;
    let s3=4*q1q1*q3-2*q1*ax+4*q2q2*q3-2*q2*ay;
    n=1/Math.sqrt(s0*s0+s1*s1+s2*s2+s3*s3);if(n){s0*=n;s1*=n;s2*=n;s3*=n;}
    const qd0=0.5*(-q1*gx-q2*gy-q3*gz)-this.b*s0;
    const qd1=0.5*(q0*gx+q2*gz-q3*gy)-this.b*s1;
    const qd2=0.5*(q0*gy-q1*gz+q3*gx)-this.b*s2;
    const qd3=0.5*(q0*gz+q1*gy-q2*gx)-this.b*s3;
    q0+=qd0*dt;q1+=qd1*dt;q2+=qd2*dt;q3+=qd3*dt;
    n=1/Math.sqrt(q0*q0+q1*q1+q2*q2+q3*q3);
    this.q=[q0*n,q1*n,q2*n,q3*n];
  }
}

function bisect(a,t,k){
  if(!a.length)return -1;if(t<=k(a[0]))return 0;if(t>=k(a[a.length-1]))return a.length-1;
  let lo=0,hi=a.length-1;while(lo<hi-1){const m=(lo+hi)>>1;k(a[m])<=t?lo=m:hi=m;}return lo;
}

let lQ=null,rQ=null;

  setTimeout(()=>{

    for(let i=0;i<L.length;i++){
      const[t,ax,ay,az,gx,gy,gz]=L[i];const dt=i>0?(t-L[i-1][0])*.001:.02;
      mL.update(gx,gy,gz,ax,ay,az,dt);lQ[i]=[...mL.q];
    }
    const mR=new Madgwick(.05); rQ=new Array(R.length);
    for(let i=0;i<R.length;i++){
      const[t,ax,ay,az]=R[i];const lt=t+OFF;
      const li=bisect(L,lt,s=>s[0]);
      const gx=lt<LDUR&&li>=0?L[li][4]:0,gy=lt<LDUR&&li>=0?L[li][5]:0,gz=lt<LDUR&&li>=0?L[li][6]:0;
      const dt=i>0?(t-R[i-1][0])*.001:.02;
      mR.update(gx,gy,gz,ax,ay,az,dt);rQ[i]=[...mR.q];
    }
    document.getElementById('status').textContent='';
    drawTLbg();buildEvts();buildRoute();

}

const rCv=document.getElementById('route-canvas'),rCur=document.getElementById('route-cursor');
const PAD=16;
let rScX,rScY,rOX,rOY;
function buildRoute(){
  const wrap=document.getElementById('route-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  rCv.width=W;rCv.height=H;rCur.width=W;rCur.height=H;
  const xs=PATH.map(p=>p[1]),ys=PATH.map(p=>p[2]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const spanX=maxX-minX||1,spanY=maxY-minY||1;
  const sc=Math.min((W-PAD*2)/spanX,(H-PAD*2)/spanY);
  rScX=sc;rScY=sc;
  rOX=PAD+(W-PAD*2-spanX*sc)/2-minX*sc;
  rOY=PAD+(H-PAD*2-spanY*sc)/2-minY*sc;
  const ctx=rCv.getContext('2d');
  ctx.fillStyle='#060610';ctx.fillRect(0,0,W,H);
  // Draw path colored by accel intensity
  for(let i=1;i<PATH.length;i++){
    const[,px,py,ag]=PATH[i],[,px0,py0]=PATH[i-1];
    const t=Math.min(ag/6,1); // 0=slow, 1=6G
    const r2=Math.round(t*255),g2=Math.round((1-t)*140),b2=Math.round((1-t)*200);
    ctx.strokeStyle=`rgb(${r2},${g2},${b2})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px0*rScX+rOX,py0*rScY+rOY);ctx.lineTo(px*rScX+rOX,py*rScY+rOY);ctx.stroke();
  }
  // Start dot
  ctx.fillStyle='#00ff88';ctx.beginPath();ctx.arc(PATH[0][1]*rScX+rOX,PATH[0][2]*rScY+rOY,5,0,Math.PI*2);ctx.fill();
  // End dot
  const ep=PATH[PATH.length-1];ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(ep[1]*rScX+rOX,ep[2]*rScY+rOY,5,0,Math.PI*2);ctx.fill();
  // Event markers on route
  for(const e of EVENTS){
    if(e.side!=='L')continue;
    const pi=bisect(PATH,e.t,p=>p[0]);if(pi<0)continue;
    const[,ex,ey]=PATH[pi];
    ctx.strokeStyle=e.type.includes('SPIN')?'#ffee00':'#ff4444';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(ex*rScX+rOX,ey*rScY+rOY,5,0,Math.PI*2);ctx.stroke();
  }
  // Legend
  ctx.font='8px monospace';ctx.fillStyle='#00ff88';ctx.fillText('● START',PAD,H-28);
  ctx.fillStyle='#ff4444';ctx.fillText('● END',PAD,H-18);
  ctx.fillStyle='#333';ctx.fillText('IMU estimate — heading drifts over time',PAD,H-6);
}

function drawRouteCur(){
  const pi=bisect(PATH,cT,p=>p[0]);if(pi<0||!rScX)return;
  const[,px,py]=PATH[pi];
  const ctx=rCur.getContext('2d');ctx.clearRect(0,0,rCur.width,rCur.height);
  const cx=px*rScX+rOX,cy=py*rScY+rOY;
  ctx.shadowColor='#00d4ff';ctx.shadowBlur=10;
  ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Direction line — next path point
  if(pi<PATH.length-1){
    const[,nx,ny]=PATH[pi+1];
    const dx=nx-px,dy=ny-py,len=Math.sqrt(dx*dx+dy*dy)||1;
    ctx.strokeStyle='rgba(0,212,255,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+dx/len*14*rScX,cy+dy/len*14*rScY);ctx.stroke();
  }
}

new ResizeObserver(()=>{if(lQ)buildRoute();}).observe(document.getElementById('route-wrap'));

/* ── EVENTS LIST ──────────────────────────────────────────────────────────── */
function buildEvts(){
  const el=document.getElementById('evts');el.innerHTML='';
  for(const e of EVENTS){
    const d=document.createElement('div');d.className='evt';
    const t=e.t,s=Math.floor(t/1000),m=Math.floor(s/60),sc=s%60,ds=Math.floor((t%1000)/100);
    const ts=m+':'+(sc<10?'0':'')+sc+'.'+ds;
    const sc2=e.side==='L'?'esl':'esr';
    const vl=e.side==='L'?e.g.toFixed(2)+'G · '+e.gyro.toFixed(1)+' r/s':e.g.toFixed(2)+'G';
    d.innerHTML=`<span class="et">${ts}</span><span class="${sc2}">${e.side}</span><span class="ety">${e.type}</span><span class="ev">${vl}</span>`;
    d.addEventListener('click',()=>seekTo(t));el.appendChild(d);
  }
}

/* ── PLAYBACK ─────────────────────────────────────────────────────────────── */
let cT=0,playing=false,speed=1,lastTs=null;
const btnP=document.getElementById('btn-p'),scrub=document.getElementById('scrubber'),tdisp=document.getElementById('tdisp');
function fmt(ms){const s=ms/1000,m=Math.floor(s/60),sc=Math.floor(s%60),ds=Math.floor((ms%1000)/100);return m+':'+(sc<10?'0':'')+sc+'.'+ds;}
function seekTo(t){cT=Math.max(0,Math.min(t,TOTAL));scrub.value=cT;tdisp.textContent=fmt(cT)+' / '+fmt(TOTAL);}
function togglePlay(){if(!lQ)return;playing=!playing;btnP.textContent=playing?'⏸':'▶';if(playing&&cT>=TOTAL)cT=0;}
btnP.addEventListener('click',togglePlay);
document.getElementById('btn-s').addEventListener('click',()=>seekTo(0));
document.getElementById('btn-e').addEventListener('click',()=>seekTo(TOTAL));
document.getElementById('btn-b').addEventListener('click',()=>seekTo(cT-5000));
document.getElementById('btn-f').addEventListener('click',()=>seekTo(cT+5000));
scrub.addEventListener('input',()=>seekTo(+scrub.value));
document.querySelectorAll('.spd').forEach(b=>b.addEventListener('click',()=>{speed=+b.dataset.s;document.querySelectorAll('.spd').forEach(x=>x.classList.remove('active'));b.classList.add('active');}));
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();togglePlay();}else if(e.key==='ArrowLeft')seekTo(cT-5000);else if(e.key==='ArrowRight')seekTo(cT+5000);});

/* ── ANIMATE ──────────────────────────────────────────────────────────────── */
function animate(ts){
  requestAnimationFrame(animate);
  // Always track lastTs while playing so pause/resume never causes a time jump
  if(playing){
    if(lastTs!==null){
      cT=Math.min(cT+(ts-lastTs)*speed,TOTAL);
      if(cT>=TOTAL){playing=false;btnP.textContent='▶';}
      scrub.value=cT;tdisp.textContent=fmt(cT)+' / '+fmt(TOTAL);
    }
    lastTs=ts;
  } else {
    lastTs=null; // reset while paused so resume always starts with a clean 1-frame delta
  }
  if(lQ){
    const li=bisect(L,cT,s=>s[0]);
    if(li>=0&&lQ[li]){const[w,x,y,z]=lQ[li];LS3.quaternion.set(x,y,z,w);}
    const rt=cT-OFF;
    if(rt>=0){const ri=bisect(R,rt,s=>s[0]);if(ri>=0&&rQ[ri]){const[w,x,y,z]=rQ[ri];RS3.quaternion.set(x,y,z,w);}}
    if(li>=0&&li<L.length){
      const[,ax,ay,az,gx,gy,gz]=L[li];
      const am=Math.sqrt(ax*ax+ay*ay+az*az),gm=Math.sqrt(gx*gx+gy*gy+gz*gz);
      document.getElementById('i-la').textContent=(am/9.81).toFixed(2)+'G';
      document.getElementById('i-lg').textContent=gm.toFixed(2)+' r/s';
      const pi=bisect(PATH,cT,p=>p[0]);
      if(pi>0&&pi<PATH.length){
        const dt=(PATH[pi][0]-PATH[pi-1][0])/1000||.1;
        const dx=PATH[pi][1]-PATH[pi-1][1],dy=PATH[pi][2]-PATH[pi-1][2];
        document.getElementById('i-spd').textContent=(Math.sqrt(dx*dx+dy*dy)/dt).toFixed(1)+' m/s';
      }
    }
    const rt2=cT-OFF;if(rt2>=0){const ri=bisect(R,rt2,s=>s[0]);if(ri>=0){const[,ax,ay,az]=R[ri];document.getElementById('i-ra').textContent=(Math.sqrt(ax*ax+ay*ay+az*az)/9.81).toFixed(2)+'G';}}
    const ne=EVENTS.find(e=>Math.abs(e.t-cT)<500);
    document.getElementById('i-ev').textContent=ne?ne.side+' '+ne.type+' '+ne.g+'G':'—';
    document.getElementById('i-ev').style.color=ne?'#ffee00':'#333';
    drawCur();drawRouteCur();updateGpsMarker(cT);
  }
  const t2=Date.now()*.0001;camera.position.x=Math.sin(t2)*.7;camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}

/* ── GPS MAP ──────────────────────────────────────────────────────────────── */
let gpsMap=null,gpsMarker=null,gpsData=[];

function initGpsMap(gps){
  gpsData=gps;
  const mapEl=document.getElementById('gps-map');
  mapEl.style.display='block';
  document.getElementById('route-canvas').style.display='none';
  document.getElementById('route-cursor').style.display='none';
  document.getElementById('route-hdr').textContent='GPS ROUTE  ('+gps.length+' fixes)';
  if(gpsMap){gpsMap.remove();gpsMap=null;}
  gpsMap=L.map('gps-map',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(gpsMap);
  const ll=gps.map(p=>[p.lat,p.lng]);
  const line=L.polyline(ll,{color:'#00d4ff',weight:3,opacity:.85}).addTo(gpsMap);
  L.circleMarker(ll[0],{radius:6,color:'#00ff88',fill:true,fillColor:'#00ff88',fillOpacity:1}).addTo(gpsMap);
  L.circleMarker(ll[ll.length-1],{radius:6,color:'#ff4444',fill:true,fillColor:'#ff4444',fillOpacity:1}).addTo(gpsMap);
  gpsMarker=L.circleMarker(ll[0],{radius:7,color:'#fff',weight:2,fill:true,fillColor:'#00d4ff',fillOpacity:1}).addTo(gpsMap);
  gpsMap.fitBounds(line.getBounds(),{padding:[16,16]});
}

function updateGpsMarker(t){
  if(!gpsMap||!gpsData.length)return;
  let lo=0,hi=gpsData.length-1;
  while(lo<hi){const mid=(lo+hi)>>1;if(gpsData[mid].t<t)lo=mid+1;else hi=mid;}
  gpsMarker.setLatLng([gpsData[lo].lat,gpsData[lo].lng]);
}

/* ── FILE LOADER ─────────────────────────────────────────────────────────── */
document.getElementById('file-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=function(ev){
    try{
      const json=JSON.parse(ev.target.result);
      const ses=Array.isArray(json)?json[0]:json;
      if(!ses)return;
      const gps=ses.gps;
      if(gps&&gps.length>1){
        initGpsMap(gps);
        const d=ses.device?ses.device.toUpperCase():'';
        const dt=ses.timestamp?new Date(ses.timestamp).toLocaleDateString():'';
        document.querySelector('#hdr h1').textContent='VECTORSTAR ⧡ '+d+'  '+dt;
        const dur=ses.duration_ms||0;
        const m=Math.floor(dur/60000),s=Math.floor((dur%60000)/1000);
        document.querySelector('.badge.bw').textContent=m+' min '+s+' s';
      }else{
        alert('No GPS data found in this session.\ngps_count: '+(ses.gps_count||0)+'\n\nRecord a new session with GPS enabled.');
      }
    }catch(err){alert('Could not parse file: '+err.message);}
  };
  rd.readAsText(f);
  e.target.value='';
});

/* ── INIT ─────────────────────────────────────────────────────────────────── */
btnP.disabled=true;rszTL();precompute();requestAnimationFrame(animate);
</script>
